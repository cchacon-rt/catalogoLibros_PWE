<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo de Libros Personales</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <img src="imgs/book_icon_tnp.png">
        <h1>Catálogo de Libros Personales</h1>
        <img src="imgs/book_icon_tnp.png">
    </header>
    <!--Nav sencilla-->
    <nav>
        <ul>
           <li><a href="#form">Agregar Libro</a></li>
           <li><a href="#acervo">Catálogo</a></li>
        </ul>
    </nav>

    <main>
    <section id="form">
        <h2>Agregar un Libro</h2>
        <form id="formulario">
            <label for="title">Título:</label>
            <input type="text" id="title" name="title" placeholder="Ingresa el título del libro">
            <span id="errorTitle" class="error"></span>

            <label for="author">Autor:</label>
            <input type="text" id="author" name="author" placeholder="Ingresa el autor del libro">
            <span id="errorAuthor" class="error"></span>

            <label for="year">Año:</label>
            <input type="number" id="year" name="year" placeholder="Año de publicación" pattern="\d{4}">
            <span id="errorYear" class="error"></span>

            <label for="genre">Género:</label>
            <!--Eleccion del genero en el form-->
            <select name="genre" id="genre">
                <option value="scifi">Ciencia ficción</option>
                <option value="biography">Biografía</option>
                <option value="design">Diseño</option>
                <option value="history">Historia</option>
                <option value="novel">Novela</option>
                <option value="manga">Manga</option>
                <option value="poetry">Poesía</option>
            </select>    <span id="errorGenre" class="error"></span>

            <button type="submit">Añadir Libro</button>
            <button  type="reset">Limpiar Formulario</button>
        </form>
        <p id="message"></p>
        </div>
    </section>


    <section id="acervo">
         <h2>Catálogo de Libros</h2>
        <input type="text" id="busqueda" placeholder="Buscar por título">

        <!-- Filtro por género -->
        <select id="filtroGenero">
            <option value="">Todos</option>
            <option value="scifi">Ciencia ficción</option>
            <option value="biography">Biografía</option>
            <option value="design">Diseño</option>
            <option value="history">Historia</option>
            <option value="novel">Novela</option>
            <option value="manga">Manga</option>
            <option value="poetry">Poesía</option>
        </select>

        <div id="resultado"></div>
    </section>
    </main>
    

    <footer>
        <h1><i>Desarrollado por cchacon-rt</i></h1>
        <h2>&copy; 2026 | Catálogo de Libros Personales | Proyecto académico PWE</h2>

    </footer>


    <script src="js/validator.js"></script>
</body>
</html>
